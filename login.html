<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Chat | Login</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <i class="fas fa-user-lock"></i>
                <h2>Welcome Back</h2>
                <p style="color: var(--text-gray);">Login to your sky account</p>
            </div>

            <div id="loginNotice" class="status-msg hidden"></div>

            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
                <input type="password" id="loginPass" placeholder="Password" required>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <div style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
                <a href="forgot-password.html" style="color: var(--text-gray); text-decoration: none;">Forgot Password?</a>
                <p style="margin-top: 10px;">New user? <a href="register.html" style="color: var(--accent);">Create Account</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
