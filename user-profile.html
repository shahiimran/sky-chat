<button id="addFriendBtn" class="btn btn-primary" style="width: auto; margin-top: 15px;"><i class="fas fa-user-plus"></i> Add Friend</button>

<script type="module">
    import { auth, db } from './js/firebase-config.js';
    import { collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const urlParams = new URLSearchParams(window.location.search);
    const targetUid = urlParams.get('uid');

    document.getElementById('addFriendBtn').onclick = async () => {
        const currentUser = auth.currentUser;
        if(!currentUser) return alert("Login first");

        // Fetch my current username for the request
        const myDoc = await getDocs(query(collection(db, "users"), where("uid", "==", currentUser.uid)));
        const myName = myDoc.docs[0].data().username;

        await addDoc(collection(db, "friendRequests"), {
            from: currentUser.uid,
            fromName: myName,
            to: targetUid,
            status: "pending",
            timestamp: new Date()
        });
        
        alert("Friend request sent!");
        document.getElementById('addFriendBtn').disabled = true;
        document.getElementById('addFriendBtn').innerText = "Request Sent";
    };
</script>
