<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sky Chat | Register</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="glass-card" style="width: 350px;">
        <h2>Join Sky Chat</h2>
        <div id="notice" class="hidden" style="margin-bottom: 10px; font-size: 0.8rem;"></div>
        
        <form id="regForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary">Sign Up</button>
        </form>
        <p style="margin-top: 15px;">Already a member? <a href="login.html" style="color: var(--accent);">Login</a></p>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
