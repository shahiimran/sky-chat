<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Chat | Home</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .layout { display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-card); border-right: 1px solid #222; padding: 20px; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .nav-link { 
            display: flex; align-items: center; gap: 15px; padding: 12px; 
            color: var(--text-gray); text-decoration: none; border-radius: 8px; margin-bottom: 5px;
        }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: #000; }
        .stat-card { background: var(--glass); padding: 20px; border-radius: 12px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2 style="color: var(--accent); margin-bottom: 30px;"><i class="fas fa-cloud-moon"></i> Sky Chat</h2>
            <nav>
                <a href="home.html" class="nav-link active"><i class="fas fa-home"></i> Dashboard</a>
                <a href="chat.html" class="nav-link"><i class="fas fa-globe"></i> Global Chat</a>
                <a href="discover.html" class="nav-link"><i class="fas fa-compass"></i> Discover</a>
                <a href="dm.html" class="nav-link"><i class="fas fa-envelope"></i> Messages</a>
                <a href="friends.html" class="nav-link"><i class="fas fa-user-friends"></i> Friends</a>
                <hr style="border: 0.5px solid #333; margin: 20px 0;">
                <a href="profile.html" class="nav-link"><i class="fas fa-user-circle"></i> My Profile</a>
                <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a>
                <a href="#" id="logoutBtn" class="nav-link" style="color: var(--error);"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <!-- Main Dashboard -->
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <h1>Welcome, <span id="userNameDisplay" style="color: var(--accent);">...</span>!</h1>
                <div id="userAvatar" style="width: 45px; height: 45px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold;">?</div>
            </header>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                <div class="stat-card">
                    <h3>Global Chat</h3>
                    <p style="color: var(--text-gray);">Talk to everyone online</p>
                    <a href="chat.html" class="btn btn-primary" style="margin-top: 15px; width: auto;">Enter Room</a>
                </div>
                <div class="stat-card">
                    <h3>Find Friends</h3>
                    <p style="color: var(--text-gray);">Search for new users</p>
                    <a href="discover.html" class="btn btn-outline" style="margin-top: 15px; width: auto; border: 1px solid var(--accent); color: var(--accent);">Discover</a>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/user.js"></script>
</body>
</html>
