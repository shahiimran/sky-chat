<!-- Path: forgot-password.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Chat | Reset Password</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p style="color: var(--text-gray);">Enter email to receive reset link</p>
            </div>

            <div id="resetNotice" class="status-msg hidden"></div>

            <form id="resetForm">
                <input type="email" id="resetEmail" placeholder="Your Registered Email" required>
                <button type="submit" class="btn btn-primary">Send Reset Link</button>
            </form>

            <p style="text-align: center; margin-top: 20px;">
                <a href="login.html" style="color: var(--accent); text-decoration: none;">Back to Login</a>
            </p>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
