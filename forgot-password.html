<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Chat | Reset Password</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <i class="fas fa-key logo-icon-small"></i>
                <h2>Reset Password</h2>
                <p style="color: var(--text-gray);">Enter your registered email</p>
            </div>

            <form id="resetForm">
                <input type="email" id="resetEmail" placeholder="Registered Email Address" required autocomplete="email">
                <button type="submit" id="resetBtn" class="btn btn-primary">Send Reset Link</button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <a href="login.html" style="color: var(--accent); text-decoration: none;">Back to Login</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
