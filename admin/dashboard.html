<!-- Path: admin/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sky Chat | Admin Control</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <!-- Password Gate -->
    <div id="adminGate" class="auth-container" style="background: var(--bg-dark); position: fixed; z-index: 999; width: 100%; height: 100%;">
        <div class="glass-card" style="width: 300px; text-align: center;">
            <h3>Admin Access</h3>
            <input type="password" id="adminPassInput" placeholder="Enter Admin Code">
            <button onclick="checkAdminPass()" class="btn btn-primary">Enter</button>
            <p id="gateErr" style="color: var(--error); margin-top: 10px;"></p>
        </div>
    </div>

    <div class="admin-grid">
        <aside class="admin-sidebar">
            <h2 style="color: var(--accent);">ADMIN</h2>
            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            <a href="dashboard.html" class="btn btn-primary" style="margin-bottom: 10px;">User Management</a>
            <a href="../moderator/dashboard.html" class="btn btn-outline" style="color:var(--accent); border-color:var(--accent); margin-bottom:10px;">Mod Panel</a>
            <a href="../home.html" class="btn btn-outline" style="color:white; border-color:#333;">Exit</a>
        </aside>

        <main style="padding: 30px; overflow-y: auto;">
            <h1>User Management</h1>
            <div class="admin-card">
                <div id="allUsersList">
                    <!-- Users list with Ban/Unban buttons -->
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/admin.js"></script>
    <script>
        function checkAdminPass() {
            const pass = document.getElementById('adminPassInput').value;
            if(pass === "23321") {
                document.getElementById('adminGate').style.display = 'none';
            } else {
                document.getElementById('gateErr').innerText = "Wrong Code!";
            }
        }
    </script>
</body>
</html>
