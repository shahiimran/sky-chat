<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Chat | Verify Email</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="glass-card auth-card" style="text-align: center;">
            <i class="fas fa-envelope-open-text" style="font-size: 4rem; color: var(--accent); margin-bottom: 20px;"></i>
            <h2>Check Your Email</h2>
            <p style="color: var(--text-gray); margin: 20px 0;">
                We sent a verification link to your email. Please click it to activate your Sky Chat account.
            </p>
            <div class="status-msg success-msg">
                Check your <b>Spam folder</b> if you don't see it!
            </div>
            <button onclick="location.reload()" class="btn btn-primary" style="margin-top: 20px;">I have verified, Login now</button>
            <p style="margin-top: 20px;">
                <a href="login.html" style="color: var(--text-gray);">Back to Login</a>
            </p>
        </div>
    </div>
</body>
</html>
