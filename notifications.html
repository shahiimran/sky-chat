<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sky Chat | Notifications</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <header style="padding: 20px 0;">
            <a href="settings.html" style="color: var(--accent); text-decoration: none;"><i class="fas fa-arrow-left"></i> Settings</a>
            <h2>Notifications</h2>
        </header>
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <span>Message Notifications</span>
                <input type="checkbox" checked style="width: 20px;">
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <span>Friend Requests</span>
                <input type="checkbox" checked style="width: 20px;">
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span>Show Preview in Home</span>
                <input type="checkbox" checked style="width: 20px;">
            </div>
        </div>
    </div>
</body>
</html>
