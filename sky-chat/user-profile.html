<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sky Chat | User Profile</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <div class="container" style="margin-top: 50px;">
        <div class="glass-card">
            <div class="profile-header">
                <img id="uAvatar" src="" class="avatar-main">
                <h2 id="uName">Loading...</h2>
                <p id="uStatus" style="color: var(--text-gray);"></p>
                <button class="btn btn-primary" style="width: auto; margin-top: 15px;"><i class="fas fa-user-plus"></i> Add Friend</button>
            </div>
            <div class="bio-box">
                <h4>About</h4>
                <p id="uBio"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');

        async function loadOtherUser() {
            const docSnap = await getDoc(doc(db, "users", uid));
            if(docSnap.exists()){
                const data = docSnap.data();
                document.getElementById('uName').innerText = data.username;
                document.getElementById('uAvatar').src = data.avatar || "https://ui-avatars.com/api/?name=" + data.username;
                document.getElementById('uStatus').innerText = data.status || "Sky User";
                document.getElementById('uBio').innerText = data.bio || "No information.";
            }
        }
        loadOtherUser();
    </script>
</body>
</html>
