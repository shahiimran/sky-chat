<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sky Chat | Appearance</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <header style="padding: 20px 0;">
            <a href="settings.html" style="color: var(--accent); text-decoration: none;"><i class="fas fa-arrow-left"></i> Settings</a>
            <h2>Appearance</h2>
        </header>
        <div class="glass-card">
            <label>Theme Mode</label>
            <select style="width: 100%; padding: 10px; background: #1c222d; color: white; border: 1px solid #333; border-radius: 8px; margin-bottom: 20px;">
                <option>Dark Mode (Sky Default)</option>
                <option disabled>Light Mode (Coming Soon)</option>
            </select>

            <label>Accent Color</label>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <div style="width: 30px; height: 30px; border-radius: 50%; background: #00d2ff; border: 2px solid white;"></div>
                <div style="width: 30px; height: 30px; border-radius: 50%; background: #ff00ff;"></div>
                <div style="width: 30px; height: 30px; border-radius: 50%; background: #00e676;"></div>
            </div>
        </div>
    </div>
</body>
</html>
