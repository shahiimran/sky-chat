<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sky Chat | Security</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <header style="padding: 20px 0;">
            <a href="settings.html" style="color: var(--accent); text-decoration: none;"><i class="fas fa-arrow-left"></i> Settings</a>
            <h2>Security</h2>
        </header>

        <div class="glass-card">
            <h4>Password Management</h4>
            <p style="color: gray; font-size: 0.8rem; margin-bottom: 10px;">We will send a reset link to your email.</p>
            <button id="securityResetPass" class="btn btn-outline" style="border: 1px solid var(--accent); color: var(--accent);">Change Password</button>

            <hr style="border: 0.5px solid #222; margin: 30px 0;">

            <h4 style="color: var(--error);">Delete Account</h4>
            <p style="color: gray; font-size: 0.8rem; margin-bottom: 10px;">This action is permanent and notifies the admin.</p>
            <button id="deleteAccountBtn" class="btn" style="background: var(--error); color: white;">Delete My Sky Account</button>
        </div>
    </div>
    <script type="module" src="js/settings.js"></script>
</body>
</html>
