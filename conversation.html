<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sky Chat | Private Conversation</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/chat.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header style="display: flex; align-items: center; padding: 15px 0; gap: 15px;">
            <a href="dm.html" style="color: var(--accent); text-decoration: none;"><i class="fas fa-chevron-left"></i></a>
            <img id="chatAvatar" src="" style="width: 40px; height: 40px; border-radius: 50%; background: #000;">
            <h4 id="chatName">Friend Name</h4>
        </header>

        <div class="chat-container glass-card">
            <div id="privateMessages" class="messages-display">
                <!-- Private messages appear here -->
            </div>

            <form id="privateForm" class="chat-input-form">
                <input type="text" id="pMsgInput" placeholder="Send a secret message..." autocomplete="off" required>
                <button type="submit" class="btn btn-primary" style="width: auto;">Send</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/dm.js"></script>
</body>
</html>
